name: Feature request
description: Suggest a product, workflow, or packaging improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the app do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Product UI
        - Deployment workflow
        - Management mode
        - Security/hardening
        - Diagnostics
        - Desktop app packaging
        - Codex Skill
        - Other
    validations:
      required: true

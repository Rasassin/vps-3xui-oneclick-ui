name: Desktop build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  macos-app:
    name: Build unsigned macOS PyInstaller app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-desktop.txt
      - name: Build unsigned app
        run: ./desktop/build_macos_app.sh
      - name: Archive unsigned app
        run: ditto -c -k --keepParent "dist/VPS 3x-ui Oneclick.app" "dist/VPS-3x-ui-Oneclick-macOS-unsigned.zip"
      - name: Upload unsigned macOS app
        uses: actions/upload-artifact@v4
        with:
          name: VPS-3x-ui-Oneclick-macOS-unsigned
          if-no-files-found: error
          path: dist/VPS-3x-ui-Oneclick-macOS-unsigned.zip

  macos-electron-app:
    name: Build unsigned macOS Electron app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-desktop.txt
          npm ci
      - name: Build unsigned Electron app
        run: npm run electron:release:mac
      - name: Upload unsigned Electron macOS app
        uses: actions/upload-artifact@v4
        with:
          name: VPS-3x-ui-Oneclick-Electron-macOS-unsigned
          if-no-files-found: error
          path: dist/VPS-3x-ui-Oneclick-Electron-macOS-arm64.zip

  windows-app:
    name: Build unsigned Windows app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-desktop.txt
      - name: Build unsigned app
        run: .\desktop\build_windows_exe.ps1
        shell: pwsh
      - name: Archive unsigned app
        run: Compress-Archive -Path "dist\VPS 3x-ui Oneclick" -DestinationPath "dist\VPS-3x-ui-Oneclick-Windows-unsigned.zip" -Force
        shell: pwsh
      - name: Upload unsigned Windows app
        uses: actions/upload-artifact@v4
        with:
          name: VPS-3x-ui-Oneclick-Windows-unsigned
          if-no-files-found: error
          path: dist/VPS-3x-ui-Oneclick-Windows-unsigned.zip

  windows-electron-app:
    name: Build unsigned Windows Electron app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-desktop.txt
          npm ci
        shell: pwsh
      - name: Build unsigned Electron Windows app
        run: npm run electron:release:win
        shell: pwsh
      - name: Upload unsigned Electron Windows app
        uses: actions/upload-artifact@v4
        with:
          name: VPS-3x-ui-Oneclick-Electron-Windows-unsigned
          if-no-files-found: error
          path: dist/VPS-3x-ui-Oneclick-Electron-Windows-x64-unsigned.zip

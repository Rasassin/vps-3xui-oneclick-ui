name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Validate tag matches app version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(python -c 'from deployer.config import APP_VERSION; print(APP_VERSION)')"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match APP_VERSION $APP_VERSION"
            exit 1
          fi
      - name: Static checks
        run: |
          python scripts/check_release_ready.py
      - name: Build release bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python desktop/check_desktop_package.py --release-zip "dist/vps-3xui-oneclick-ui-v${VERSION}.zip"
          test -s "dist/GITHUB_RELEASE_v${VERSION}.md"
          test -s "dist/SHA256SUMS_v${VERSION}.txt"
          test -s "dist/release-manifest-v${VERSION}.json"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/vps-3xui-oneclick-ui-v${VERSION}.zip" \
            "dist/GITHUB_RELEASE_v${VERSION}.md" \
            "dist/SHA256SUMS_v${VERSION}.txt" \
            "dist/release-manifest-v${VERSION}.json" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "dist/GITHUB_RELEASE_v${VERSION}.md"
